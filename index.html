<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <div class="video-container">
    <video id="welcomeVideo" autoplay muted playsinline preload="auto">
      <source src="media/VideoIntro2.mp4" type="video/mp4">
    </video>

    <audio id="bgMusic" loop>
  <source src="media/music.mp3" type="audio/mpeg">
</audio>


<button class="button2" id="clickPrompt">
  <img src="media/play.png" alt="Teruskan">
</button>



    <div class="tap-layer" id="tapLayer"></div>
  </div>

<script>
  const video = document.getElementById("welcomeVideo");
  const prompt = document.getElementById("clickPrompt");
  const tapLayer = document.getElementById("tapLayer");

  const PAUSE_AT = 1.7; 
  const FINAL_PAUSE_AT = 16.3;

  let pausedOnce = false;
  let finalPaused = false;

 
  function checkTime() {
    if (pausedOnce) return;

    if (video.currentTime >= PAUSE_AT) {
      pausedOnce = true;

      video.pause();
      showPrompt();

      video.removeEventListener("timeupdate", checkTime);
    }
  }

  video.addEventListener("timeupdate", checkTime);


function checkTime() {
  
  if (!pausedOnce && video.currentTime >= PAUSE_AT) {
    pausedOnce = true;
    video.pause();
    showPrompt();
    return;
  }


  if (pausedOnce && !finalPaused && video.currentTime >= FINAL_PAUSE_AT) {
    finalPaused = true;
    video.pause();
    showPrompt();
    return;
  }
}



const music = document.getElementById("bgMusic");

function onContinue(e) {
  if (e) {
    e.preventDefault();
    e.stopPropagation();
  }

  hidePrompt();

  if (!music.dataset.started) {
    let savedTime = localStorage.getItem("musicTime");

  if (!savedTime) {
    savedTime = 0;
  }

  music.currentTime = savedTime;

    music.play().catch(() => {});
    music.dataset.started = "true";

    setInterval(() => {
      localStorage.setItem("musicTime", music.currentTime);
      localStorage.setItem("musicPlaying", "true");
    }, 1000);
  }

  if (finalPaused) {
    window.location.href = "main.html";
    return;
  }

  video.play().catch(() => {});
}



prompt.addEventListener("click", onContinue);


tapLayer.addEventListener("click", onContinue);



  function showPrompt() {
    prompt.classList.add("show");
    tapLayer.classList.add("active");
  }

  function hidePrompt() {
    prompt.classList.remove("show");
    tapLayer.classList.remove("active");
  }
</script>


</body>
</html>
